<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexaBiz — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, sans-serif; background: #F0F4F8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; border-radius: 16px; padding: 48px; text-align: center; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { color: #1A2B4A; font-size: 24px; margin-bottom: 12px; }
    p { color: #637693; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
    .btn { background: #2DB89E; color: white; border: none; border-radius: 10px; padding: 12px 28px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .btn:hover { background: #1E9E87; }
    .pos-note { background: #eefaf7; border: 1px solid #2DB89E33; border-radius: 10px; padding: 16px; margin-top: 20px; font-size: 13px; color: #1A2B4A; text-align: left; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>NexaBiz cannot reach the server right now. Check your internet connection and try again.</p>
    <button class="btn" onclick="location.reload()">Try Again</button>
    <div class="pos-note">
      <strong>🛒 POS Terminal:</strong> Sales made while offline will be automatically synced to the server and posted to the GL once your connection is restored.
    </div>
  </div>
</body>
</html>
