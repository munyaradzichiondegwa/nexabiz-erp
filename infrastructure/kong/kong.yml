      - name: assets-api
        paths: ["/api/v1/assets"]
        strip_path: false

  # AI Service (Python/FastAPI)
  - name: ai-service
    url: http://ai-service:8000
    plugins:
      - name: jwt
        config:
          claims_to_verify: ["exp"]
      - name: rate-limiting
        config:
          minute: 60
          policy: local
    routes:
      - name: ai-api
        paths: ["/api/v1/ai"]
        strip_path: false

# Global plugins
plugins:
  - name: correlation-id
    config:
      header_name: X-Correlation-ID
      generator: uuid#counter
      echo_downstream: true
  - name: response-transformer
    config:
      add:
        headers:
          - "X-Powered-By: NexaBiz"
          - "X-Version: 3.1.0"

# JWT Consumer (shared secret for all services)
consumers:
  - username: nexabiz-web
    jwt_secrets:
      - algorithm: HS256
        secret: "REPLACE_WITH_JWT_SECRET_FROM_ENV"
