_format_version: "3.0"
_transform: true

# NexaBiz — Kong API Gateway (DB-less declarative config)
# Routes all /api/v1/* traffic to the correct microservice
# JWT auth is validated at the gateway — services trust X-Tenant-ID header

services:

  # Auth Service (public — no JWT plugin)
  - name: auth-service
    url: http://auth-service:3001
    routes:
      - name: auth-public
        paths: ["/api/v1/auth"]
        methods: ["GET","POST","PUT","DELETE","OPTIONS"]
        strip_path: false

  # User Service
  - name: user-service
    url: http://user-service:3002
    plugins:
      - name: jwt
        config:
          secret_is_base64: false
          key_claim_name: sub
          claims_to_verify: ["exp"]
      - name: request-transformer
        config:
          add:
            headers: ["X-Gateway: kong"]
    routes:
      - name: users-api
        paths: ["/api/v1/users"]
        strip_path: false

  # GL Service (Spring Boot)
  - name: gl-service
    url: http://gl-service:8080
    plugins:
      - name: jwt
        config:
          claims_to_verify: ["exp"]
      - name: rate-limiting
        config:
          minute: 1000
          policy: local
    routes:
      - name: accounting-api
        paths: ["/api/v1/accounting", "/api/v1/gl"]
        strip_path: false

  # GL Integration Service (internal, no public route needed)
  - name: gl-integration-service
    url: http://gl-integration-service:3021
    routes:
      - name: gl-integration-health
        paths: ["/internal/gl"]
        strip_path: false

  # Inventory Service
  - name: inventory-service
    url: http://inventory-service:3004
    plugins:
      - name: jwt
        config:
          claims_to_verify: ["exp"]
    routes:
      - name: inventory-api
        paths: ["/api/v1/inventory"]
        strip_path: false

  # POS Service
  - name: pos-service
    url: http://pos-service:3005
    plugins:
      - name: jwt
        config:
          claims_to_verify: ["exp"]
    routes:
      - name: pos-api
        paths: ["/api/v1/pos"]
        strip_path: false

  # Banking Service
  - name: banking-service
    url: http://banking-service:3006
