      - name: jwt
        config:
          claims_to_verify: ["exp"]
    routes:
      - name: banking-api
        paths: ["/api/v1/banking"]
        strip_path: false

  # AR Service
  - name: ar-service
    url: http://ar-service:3007
    plugins:
      - name: jwt
        config:
          claims_to_verify: ["exp"]
    routes:
      - name: ar-api
        paths: ["/api/v1/accounting/ar"]
        strip_path: false

  # AP Service
  - name: ap-service
    url: http://ap-service:3008
    plugins:
      - name: jwt
        config:
          claims_to_verify: ["exp"]
    routes:
      - name: ap-api
        paths: ["/api/v1/accounting/ap"]
        strip_path: false

  # Reporting Service (also serves dashboard KPIs)
  - name: reporting-service
    url: http://reporting-service:3009
    plugins:
      - name: jwt
        config:
          claims_to_verify: ["exp"]
      - name: response-caching
        config:
          content_type: ["application/json"]
          cache_ttl: 30
    routes:
      - name: reporting-api
        paths: ["/api/v1/reporting", "/api/v1/dashboard"]
        strip_path: false

  # Procurement Service
  - name: procurement-service
