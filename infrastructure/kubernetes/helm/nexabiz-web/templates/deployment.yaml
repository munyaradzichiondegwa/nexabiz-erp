{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}-service
  namespace: {{ $.Release.Namespace }}
  labels:
    app: nexabiz
    component: {{ $name }}-service
    version: {{ $.Chart.AppVersion }}
spec:
  replicas: {{ $svc.replicas | default 1 }}
  selector:
    matchLabels:
      app: nexabiz
      component: {{ $name }}-service
  template:
    metadata:
      labels:
        app: nexabiz
        component: {{ $name }}-service
        version: {{ $.Chart.AppVersion }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "{{ $svc.port }}"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: {{ $name }}-service
          image: {{ $.Values.global.imageRegistry }}/nexabiz-{{ $name }}-service:{{ $.Values.global.imageTag }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
          envFrom:
            - secretRef:
                name: nexabiz-secrets
          env:
            - name: NODE_ENV
              value: {{ $.Values.env }}
            - name: PORT
              value: "{{ $svc.port }}"
          readinessProbe:
            httpGet:
              path: /health
              port: {{ $svc.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ $svc.port }}
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml ($svc.resources | default $.Values.services.auth.resources) | nindent 12 }}
      terminationGracePeriodSeconds: 30
{{- end }}
{{- end }}
