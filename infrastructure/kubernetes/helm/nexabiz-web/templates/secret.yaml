# Secrets are managed externally via HashiCorp Vault + External Secrets Operator
# This template creates the ExternalSecret resource that syncs from Vault
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nexabiz-secrets
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: nexabiz-secrets
    creationPolicy: Owner
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: nexabiz/{{ .Values.env }}/auth
        property: jwt_secret
    - secretKey: AUTH_DB_URL
      remoteRef:
        key: nexabiz/{{ .Values.env }}/databases
        property: auth_db_url
    - secretKey: ACCOUNTING_DB_URL
      remoteRef:
        key: nexabiz/{{ .Values.env }}/databases
        property: accounting_db_url
    - secretKey: KAFKA_BROKERS
      remoteRef:
        key: nexabiz/{{ .Values.env }}/kafka
        property: brokers
    - secretKey: REDIS_URL
      remoteRef:
        key: nexabiz/{{ .Values.env }}/redis
        property: url
